<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/style.css" />
    <title>chess-DOMination</title>
  </head>
  <body>
    <div id="app">
      <div id="board"></div>
      <div class="sidebar">
        <div id="movement-anotation-container"></div>
        <div class="turn">
          <h1 class="turn-text">
            <img
              src="./src/assets/pieces-basic-svg/king-w.svg"
              style="width: 1em; height: 1em; vertical-align: middle"
            /> White turn
          </h1>
        </div>
        <button
          id="reset-btn"
          style="
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-size: 1.2em;
            background-color: #0c0042;
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
          "
        >
          Restart Game
        </button>
      </div>
    </div>
    <div class="pgn-content">
      <div class="pgn-header">
        <h3>PGN</h3>
        <button id="copy-pgn-btn" title="Copiar PGN">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="copy-icon"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path
              d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
            ></path>
          </svg>
        </button>
      </div>
      <textarea id="pgn-output" readonly placeholder="1. e4 e5..."></textarea>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
