<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/style.css" />
    <title>chess-DOMination</title>
  </head>
  <body>
    <div id="app">
      <div id="board"></div>
      <div class="sidebar">
        <div id="movement-anotation-container"></div>
        <div class="turn">
          <h1 class="turn-text">
            <img
              src="/pieces-basic-svg/king-w.svg"
              style="width: 1em; height: 1em; vertical-align: middle"
            />
            White turn
          </h1>
        </div>
        <button
          id="reset-btn"
          style="
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-size: 1.2em;
            background-color: #0c0042;
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
          "
        >
          Restart Game
        </button>
      </div>
    </div>
    <div class="pgn-content">
      <div class="pgn-header">
        <h3>PGN</h3>
        <button id="copy-pgn-btn" title="Copiar PGN">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="copy-icon"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path
              d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
            ></path>
          </svg>
        </button>
      </div>
      <textarea id="pgn-output" readonly placeholder="1. e4 e5..."></textarea>
    </div>
    <div id="promotion-modal">
      <p style="color: white; margin: 0 0 8px 0">Promote pawn</p>
      <div class="promotion-options" id="promotion-options"></div>
    </div>
    <footer
      style="
        margin-top: 2rem;
        padding: 1rem 1.25rem;
        border-top: 0.5px solid rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      "
    >
      <span style="font-size: 13px; color: #888"
        >chess-DOMination &mdash; Vanilla JS chess in the browser</span
      >
      <div style="display: flex; align-items: center; gap: 16px">
        <a
          href="https://github.com/sebas-gith"
          target="_blank"
          style="
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
          "
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          @sebas-gith
        </a>
        <span style="color: #ccc">&middot;</span>
        <a
          href="https://github.com/sebas-gith/chess-DOMination"
          target="_blank"
          style="
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
          "
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          chess-DOMination
        </a>
      </div>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
